# ── ROUTINES ────────────────────────────────────────────────────────────────

routines:
  heartbeat:
    triggers:
      - kind: schedule
        cronExpression: "0 6 * * *"
        timezone: UTC
  pipeline-cycle:
    triggers:
      - kind: schedule
        cronExpression: "0 8 * * 1"
        timezone: UTC
  daily-kpi-check:
    triggers:
      - kind: schedule
        cronExpression: "0 9 * * *"
        timezone: UTC
