name: Heartbeat — System Health

on:
  schedule:
    - cron: '0 6 * * *'  # Every day 06:00 UTC

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Heartbeat
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --company thimofejs-game-studio --agent ceo \
            "Run heartbeat skill: verify last pipeline-cycle ran, check for failed workflows, report system status"
