schema: paperclip/v1

# ── OPUS (executive layer) ───────────────────────────────────────────────────

agents:
  ceo:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: required

  producer:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: required

  learning-agent:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
    inputs:
      env:
        GH_TOKEN:
          kind: secret
          requirement: required

